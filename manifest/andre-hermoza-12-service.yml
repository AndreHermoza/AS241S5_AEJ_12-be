# kubectl apply -f juan-condori-00-service.yml
apiVersion: v1
kind: Service
metadata:
  name: andre-hermoza-12-service
  namespace: andre-hermoza-12-namespace
spec:
  type: NodePort      #30000-32767  # Cambia a LoadBalancer si estás en un entorno de nube
  ports:
    - port: 30003       # Puerto que el Service expondrá
      targetPort: 8086  # Puerto en el contenedor donde tu aplicación escucha
      nodePort: 30003   # Puerto asignado en el nodo, opcional
  selector:
    app: andre-hermoza-12-deployment  # Debe coincidir con las etiquetas del Deployment